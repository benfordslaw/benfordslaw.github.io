<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Music</title>
    <style>
      p {
        line-height:1.125;
      }

      h1, h2, h3, h4, h5, h6 {
        line-height: 0.25;
      }
    </style>
  </head>
  <body>
    <h1>Music</h1>
    <h4>
      <script>
        (async () => {
          const response = await fetch('https://api.github.com/repos/benfordslaw/benfordslaw.github.io/contents/Music');
          const data = await response.json();
          let htmlString = '<ul>';
          for (let file of data) {
            if(file.name != 'index.html'){
              htmlString += `<li><a href="${file.path}">${file.name}</a></li>`;
            }
          }
          htmlString += '</ul>';
          document.getElementsByTagName('h4')[0].innerHTML = htmlString;
        })()
      </script>
    </h4>
  <body>
</html>
