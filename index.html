<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="#">
    <title>Krummenacher</title>
    <style>
      p {
        line-height:1.125;
      }

      h1, h2, h3, h4, h5, h6 {
        line-height: 0.25;
      }

      td {
        vertical-align: top;
      }
    </style>
  </head>
  <body style="margin: 50px;">
    <h1>Krummenacher</h1>
    <h3>/krumɪnɑkər/</h3>
    <p></p>
    <script>
      const data = [];
      let htmlString = '';
      let ls = [[]];

      asynCall('https://api.github.com/repos/benfordslaw/benfordslaw.github.io/contents/', 0);
      
      async function asynCall(url, count) {
        let response = await fetch(url);
        data[count] = await response.json();
        data[count].forEach((dataPt, i) => {
          if(dataPt.name != 'index.html'){
            if(dataPt.name.indexOf('.') != -1){
              ls[count].push(`<a href="${data[count][i].path}">${data[count][i].name}</a>`);
            } else {
              ls[count].push(`${dataPt.name}`);
              
              if(!ls[count+1]){
                ls.push([]);
              }
              asynCall(data[count][i].url, count+1);
            }
          }
        });
        ls[count].push('†');
        updateList();
      }

      function updateList() {
        let groups = [];
        ls.forEach(list => {
          groups.push([]);
          let tempTxt = '';
          list.forEach((listElement, k) => {
            if(listElement.indexOf('<a href') != -1){
              tempTxt += `<li>${listElement}</li>`;
            } else if (listElement.indexOf('†') != -1){
              tempTxt += '</ul>';
              groups[groups.length-1].push(tempTxt);
              tempTxt = '';
            } else {
              tempTxt += `<li>${listElement}</li>`;
            }
          });
        });

        let htmlString = '<table><tr>';
        ls.forEach((list, j) => {
          htmlString += '<td><ul>';
          list.forEach((listElement, k) => {
            if(listElement.indexOf('<a href') == -1 && listElement.indexOf('†') == -1){
              if(groups[j+1][k]){
                if(groups[j+1][k].length > 0){
                  htmlString += `<li>${listElement}</li><ul>${groups[j+1][k]}`;
                } else {
                  htmlString += `<li>${listElement}</li><ul>`;
                }
              }
            }
          });
          htmlString += '</ul></td>';
        });
        htmlString += '<tr></table>'; 
        document.getElementsByTagName('p')[0].innerHTML = htmlString;

      }
    </script>
  <body>
</html>
