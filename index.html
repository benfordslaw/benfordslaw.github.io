<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="#">
    <title>Krummenacher</title>
    <style>
      p {
        line-height:1.125;
      }

      h1, h2, h3, h4, h5, h6 {
        line-height: 0.25;
      }
    </style>
  </head>
  <body style="margin: 50px;">
    <h1>Krummenacher</h1>
    <h3>/krumɪnɑkər/</h3>
    <p>
      <script>
        let response;
        const data = [];
        let count = 0;

        asynCall('https://api.github.com/repos/benfordslaw/benfordslaw.github.io/contents/');
        
        async function asynCall(url) {
          response = await fetch(url);
          data.push(await response.json());
          console.log(data);
          let htmlString = '<ul>';
          for (var i=0; i<data[0].length; i++) {
            if(data[0][i].name != 'index.html'){
              if(data[0][i].name.indexOf('.') == -1){
                htmlString += `<li>${data[0][i].name}</li>`;
                
                //asynCall(data[0][i].url);

                response = await fetch(data[0][i].url);
                data.push(await response.json());
                for(var j=0; j<data[i+1].length; j++){
                  console.log(data[i+1][j]);
                  if(data[i+1][j].name.indexOf('.') == -1){
                    htmlString += `<ul><li>${data[i+1][j].name}</li></ul>`;
                  } else {
                    htmlString += `<ul><li><a href="${data[i+1][j].path}">${data[i+1][j].name}</a></li></ul>`;
                  }
                }

              } else {
                htmlString += `<li><a href="${data[0][i].path}">${data[0][i].name}</a></li>`;
              }
            } else {
              data[0].splice(i, 1, );
              i--;
            }
          }
          htmlString += '</ul>';
          document.getElementsByTagName('p')[0].innerHTML = htmlString;
        }

        

      </script>
    <p>
  <body>
</html>
