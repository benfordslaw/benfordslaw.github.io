<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="#">
    <title>Krummenacher</title>
    <style>
      p {
        line-height:1.125;
      }

      h1, h2, h3, h4, h5, h6 {
        line-height: 0.25;
      }
    </style>
  </head>
  <body style="margin: 50px;">
    <h1>Krummenacher</h1>
    <h3>/krumɪnɑkər/</h3>
    <p>
      <script>
        let response;
        const data = [];
        
        (async () => {
          response = await fetch('https://api.github.com/repos/benfordslaw/benfordslaw.github.io/contents/');
          data.push(await response.json());
          console.log(data);
          let htmlString = '<ul>';
          for (let file of data[0]) {
            if(file.name != 'index.html'){
              htmlString += `<li><a href="${data[data.length-1][0].path}">${data[data.length-1][0].name}</a></li>`;
              response = await fetch(file.url);
              data.push(await response.json());
              console.log(data[data.length-1][0]);
              htmlString += `<li><a href="${data[data.length-1][0].path}">${data[data.length-1][0].name}</a></li>`;
            }
          }
          htmlString += '</ul>';
          document.getElementsByTagName('p')[0].innerHTML = htmlString;
        })()
      </script>
    <p>
  <body>
</html>
